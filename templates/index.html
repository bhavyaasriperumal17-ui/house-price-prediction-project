<!DOCTYPE html>
<html>
<head>
    <title>House Price Prediction</title>
</head>
<body>

    <h2>House Price Prediction</h2>

    <form action="/predict" method="post">
        <input type="number" name="f1" placeholder="Feature 1" required><br><br>
        <input type="number" name="f2" placeholder="Feature 2" required><br><br>
        <input type="number" name="f3" placeholder="Feature 3" required><br><br>

        <button type="submit">Predict</button>
    </form>

    <h3>{{ prediction_text }}</h3>

</body>
</html>
